name: Build Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build arc-bot (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: arc-bot-linux-x86_64
            binary: target/release/arc-bot
            target: ""

          - os: windows-latest
            artifact: arc-bot-windows-x86_64
            binary: target/release/arc-bot.exe
            target: ""

          - os: macos-latest
            artifact: arc-bot-macos-aarch64
            binary: target/release/arc-bot
            target: ""

          - os: ubuntu-latest
            artifact: arc-bot-android-aarch64
            binary: target/aarch64-linux-android/release/arc-bot
            target: aarch64-linux-android

          - os: ubuntu-latest
            artifact: arc-bot-android-armv7
            binary: target/armv7-linux-androideabi/release/arc-bot
            target: armv7-linux-androideabi

          - os: ubuntu-latest
            artifact: arc-bot-linux-aarch64
            binary: target/aarch64-unknown-linux-gnu/release/arc-bot
            target: aarch64-unknown-linux-gnu

          - os: ubuntu-latest
            artifact: arc-bot-linux-armv7
            binary: target/armv7-unknown-linux-gnueabihf/release/arc-bot
            target: armv7-unknown-linux-gnueabihf

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust cross-compile target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Install Android NDK
        if: contains(matrix.target, 'android')
        run: |
          sudo apt-get install -y unzip wget
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip -d $HOME
          echo "ANDROID_NDK_HOME=$HOME/android-ndk-r26d" >> $GITHUB_ENV
          echo "NDK_TOOLCHAIN=$HOME/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV

      - name: Configure Android linker (aarch64)
        if: matrix.target == 'aarch64-linux-android'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.aarch64-linux-android]
          linker = "/home/runner/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"
          ar = "/home/runner/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          EOF
          echo "CC_aarch64_linux_android=$HOME/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=$HOME/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$HOME/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV

      - name: Configure Android linker (armv7)
        if: matrix.target == 'armv7-linux-androideabi'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.armv7-linux-androideabi]
          linker = "/home/runner/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang"
          ar = "/home/runner/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          EOF
          echo "CC_armv7_linux_androideabi=$HOME/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang" >> $GITHUB_ENV
          echo "AR_armv7_linux_androideabi=$HOME/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar" >> $GITHUB_ENV
          echo "CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER=$HOME/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang" >> $GITHUB_ENV

      - name: Install cross-compile tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Install cross-compile tools (Linux armv7)
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-arm-linux-gnueabihf
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.armv7-unknown-linux-gnueabihf]
          linker = "arm-linux-gnueabihf-gcc"
          EOF

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            cargo build --release --target ${{ matrix.target }}
          else
            cargo build --release
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          retention-days: 90